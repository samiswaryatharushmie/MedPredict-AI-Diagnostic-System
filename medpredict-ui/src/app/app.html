<div class="glass-panel">
  <div class="header">
    <h1>🩺 MedPredict AI</h1>
    <p>Intelligent Clinical Diagnostics</p>
  </div>

  <div class="input-grid">
    <div class="input-group">
      <label>Patient Age</label>
      <input type="number" [(ngModel)]="patientData.Age" placeholder="e.g. 45">
    </div>
    <div class="input-group">
      <label>Glucose Level (mg/dL)</label>
      <input type="number" [(ngModel)]="patientData.Glucose" placeholder="e.g. 140">
    </div>
    <div class="input-group">
      <label>Blood Pressure (mm Hg)</label>
      <input type="number" [(ngModel)]="patientData.BloodPressure" placeholder="e.g. 80">
    </div>
    <div class="input-group">
      <label>BMI</label>
      <input type="number" [(ngModel)]="patientData.BMI" placeholder="e.g. 28.5">
    </div>
    <div class="input-group">
      <label>Insulin Level (IU/mL)</label>
      <input type="number" [(ngModel)]="patientData.Insulin" placeholder="e.g. 120">
    </div>
    <div class="input-group">
      <label>Prior Pregnancies</label>
      <input type="number" [(ngModel)]="patientData.Pregnancies" placeholder="e.g. 1">
    </div>
  </div>

<div class="action-section">
    <button class="btn-predict" (click)="runPrediction()" [disabled]="isLoading">
      
      <span *ngIf="!isLoading">Run Neural Analysis 🚀</span>
      
      <span *ngIf="isLoading" class="loader-text">
        <span class="spinner"></span> Analyzing Vitals...
      </span>

    </button>
  </div>

  <div class="result-card" *ngIf="predictionResult || errorMessage" 
       [class.danger]="predictionResult?.label === 'Diabetic'" 
       [class.safe]="predictionResult?.label === 'Non-Diabetic'">
       
    <p class="error-text" *ngIf="errorMessage">{{ errorMessage }}</p>

    <div *ngIf="predictionResult">
      <h2>Diagnosis: <span>{{ predictionResult.label }}</span></h2>
      <div class="confidence-bar-bg">
        <div class="confidence-bar-fill" [style.width.%]="predictionResult.confidence_score * 100"></div>
      </div>
      <p class="confidence-text">AI Confidence: {{ predictionResult.confidence_score * 100 | number:'1.1-2' }}%</p>
    </div>
  </div>
</div>
